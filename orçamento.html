<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Orçamentos Elétricos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #f5a623;
    --accent2: #e8831a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --success: #22c55e;
    --danger: #ef4444;
    --cat1: #f5a623;
    --cat2: #38bdf8;
    --cat3: #a78bfa;
    --cat4: #34d399;
    --cat5: #fb7185;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; }

  /* ===== NAV TABS ===== */
  .nav-tabs {
    display: flex;
    gap: 4px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .nav-tab {
    padding: 10px 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--surface2);
  }

  /* ===== LAYOUT ===== */
  .app-body {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    height: calc(100vh - 113px);
    overflow: hidden;
  }

  .panel {
    overflow-y: auto;
    padding: 24px 32px;
  }
  .panel::-webkit-scrollbar { width: 6px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .right-panel {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }

  /* ===== SEARCH ===== */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px 10px 40px;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .ico {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 15px;
  }

  /* ===== CATEGORY ===== */
  .category {
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface2);
    cursor: pointer;
    user-select: none;
  }
  .cat-icon { font-size: 18px; }
  .cat-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
    flex: 1;
  }
  .cat-count {
    background: var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .cat-toggle { color: var(--muted); font-size: 12px; transition: transform .2s; }
  .category.collapsed .cat-toggle { transform: rotate(-90deg); }
  .category.collapsed .service-list { display: none; }

  /* ===== SERVICE LIST ===== */
  .service-list { padding: 8px; }
  .service-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
    border: 1px solid transparent;
  }
  .service-item:hover { background: var(--surface2); border-color: var(--border); }
  .service-item.added { background: rgba(245,166,35,.07); border-color: rgba(245,166,35,.2); }
  .service-name { flex: 1; font-size: 13.5px; }
  .service-prices {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .price-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .15s;
    white-space: nowrap;
  }
  .price-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .price-btn.single {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
    font-size: 12px;
    padding: 4px 12px;
  }
  .price-btn.eval {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--muted);
    cursor: default;
  }

  /* ===== RIGHT PANEL - ORÇAMENTO ===== */
  .budget-header {
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  .budget-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .client-fields { display: flex; flex-direction: column; gap: 8px; }
  .client-fields input, .client-fields textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    width: 100%;
    transition: border .2s;
    resize: none;
  }
  .client-fields input:focus, .client-fields textarea:focus { border-color: var(--accent); }

  /* ===== ITEMS LIST ===== */
  .budget-items {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
  }
  .budget-items::-webkit-scrollbar { width: 4px; }
  .budget-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 40px 20px;
    font-size: 13px;
  }
  .empty-state .e-icon { font-size: 36px; margin-bottom: 10px; opacity: .4; }

  .budget-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn .2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .bi-info { flex: 1; }
  .bi-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .bi-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .qty-btn {
    width: 24px; height: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .qty-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
  .qty-val { font-size: 13px; min-width: 20px; text-align: center; font-weight: 600; }
  .bi-price { font-size: 13px; color: var(--accent); font-weight: 600; white-space: nowrap; }
  .bi-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s;
  }
  .bi-remove:hover { color: var(--danger); }

  /* Mão de obra inline */
  .bi-labor {
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .labor-label { font-size: 11px; color: var(--muted); }
  .labor-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    width: 80px;
    outline: none;
  }
  .labor-input:focus { border-color: var(--accent); }

  /* ===== TOTALS ===== */
  .budget-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .total-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 6px;
    color: var(--muted);
  }
  .total-row.grand {
    font-size: 17px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--text);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .total-row.grand span:last-child { color: var(--accent); }

  .discount-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .discount-row label { font-size: 13px; color: var(--muted); flex: 1; }
  .discount-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    width: 70px;
    outline: none;
    text-align: right;
  }
  .discount-row input:focus { border-color: var(--accent); }
  .discount-row span { font-size: 12px; color: var(--muted); }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 9px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); }
  .btn-danger { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--danger); }
  .btn-danger:hover { background: rgba(239,68,68,.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .footer-btns {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .footer-btns .btn { flex: 1; justify-content: center; }

  /* ===== SAVED PANEL ===== */
  #savedPanel { padding: 24px 32px; }
  .saved-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  .saved-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color .2s;
  }
  .saved-card:hover { border-color: var(--accent); }
  .sc-num {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    font-family: 'Syne', sans-serif;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .sc-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .sc-date { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .sc-total { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  .sc-actions { display: flex; gap: 8px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
  }
  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 9999;
    animation: toastIn .3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .toast.success { border-color: rgba(34,197,94,.3); }
  .toast.error { border-color: rgba(239,68,68,.3); }

  /* ===== PRINT ===== */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background: #fff !important; color: #000 !important; }
    header, .nav-tabs, .app-body > .panel, .right-panel { display: none !important; }
    #printArea { display: block !important; }
  }

  #printArea {
    display: none;
    padding: 32px;
    font-family: 'DM Sans', sans-serif;
    color: #111;
    background: #fff;
    max-width: 800px;
    margin: 0 auto;
  }
  .print-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid #e5e7eb;
  }
  .print-company { }
  .print-company-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #111;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .print-company-name span { color: #e8831a; }
  .print-company-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .print-meta { text-align: right; }
  .print-orcamento-num {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #e8831a;
  }
  .print-date { font-size: 12px; color: #888; margin-top: 3px; }
  .print-client-box {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .print-client-box strong { font-weight: 600; }
  .print-obs { font-size: 12px; color: #555; margin-top: 6px; }
  .print-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .print-table th {
    background: #1c2030;
    color: #e8eaf0;
    padding: 10px 12px;
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .print-table th:last-child, .print-table td:last-child { text-align: right; }
  .print-table td {
    padding: 9px 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .print-table tr:hover td { background: #fafafa; }
  .print-labor-zero { display: none; }
  .print-totals {
    display: flex;
    justify-content: flex-end;
  }
  .print-totals-box {
    width: 240px;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
  }
  .pt-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 14px;
    font-size: 13px;
    border-bottom: 1px solid #f0f0f0;
  }
  .pt-row.grand {
    background: #1c2030;
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    border-bottom: none;
  }
  .pt-row.grand span:last-child { color: #f5a623; }
  .print-footer {
    margin-top: 32px;
    border-top: 1px solid #e5e7eb;
    padding-top: 16px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
  }
  .print-sig {
    margin-top: 48px;
    display: flex;
    gap: 60px;
  }
  .sig-line {
    border-top: 1px solid #ccc;
    padding-top: 6px;
    font-size: 12px;
    color: #888;
    width: 200px;
    text-align: center;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>Elétrica<span>Pro</span></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="openSettings()">⚙ Configurar Empresa</button>
    <button class="btn btn-primary btn-sm" onclick="newBudget()">+ Novo Orçamento</button>
  </div>
</header>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('new')">📋 Novo Orçamento</button>
  <button class="nav-tab" onclick="switchTab('saved')">📁 Orçamentos Salvos</button>
</div>

<!-- APP BODY -->
<div class="app-body" id="newTab">

  <!-- LEFT: SERVICES -->
  <div class="panel">
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar serviço..." oninput="filterServices()">
    </div>
    <div id="servicesContainer"></div>
  </div>

  <!-- RIGHT: BUDGET -->
  <div class="right-panel">
    <div class="budget-header">
      <div class="budget-title">
        📄 <span id="budgetNumDisplay">Orçamento #001</span>
      </div>
      <div class="client-fields">
        <input type="text" id="clientName" placeholder="Nome do cliente" oninput="updatePreview()">
        <input type="text" id="clientPhone" placeholder="Telefone / WhatsApp" oninput="updatePreview()">
        <input type="text" id="clientAddr" placeholder="Endereço" oninput="updatePreview()">
        <textarea id="clientObs" rows="2" placeholder="Observações (opcional)..." oninput="updatePreview()"></textarea>
      </div>
    </div>

    <div class="budget-items" id="budgetItems">
      <div class="empty-state">
        <div class="e-icon">⚡</div>
        <div>Clique nos serviços ao lado<br>para adicionar ao orçamento</div>
      </div>
    </div>

    <div class="budget-footer">
      <div class="total-row"><span>Subtotal serviços</span><span id="subtotalServices">R$ 0,00</span></div>
      <div class="total-row"><span>Mão de obra</span><span id="subtotalLabor">R$ 0,00</span></div>
      <div class="discount-row">
        <label>Desconto</label>
        <input type="number" id="discountVal" min="0" step="0.01" value="0" oninput="recalcTotal()">
        <span>R$</span>
      </div>
      <div class="total-row grand">
        <span>TOTAL</span><span id="grandTotal">R$ 0,00</span>
      </div>
      <div class="footer-btns">
        <button class="btn btn-outline" onclick="saveBudget()">💾 Salvar</button>
        <button class="btn btn-primary" onclick="printBudget()">🖨 Imprimir</button>
      </div>
      <div class="footer-btns">
        <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center" onclick="clearBudget()">🗑 Limpar tudo</button>
      </div>
    </div>
  </div>
</div>

<!-- SAVED TAB -->
<div id="savedPanel" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;">Orçamentos Salvos</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px;" id="savedCount">0 orçamentos</div>
    </div>
    <button class="btn btn-outline" onclick="exportAll()">⬇ Exportar Todos</button>
  </div>
  <div class="saved-grid" id="savedGrid"></div>
</div>

<!-- MODAL SAVE -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h3>💾 Salvar Orçamento</h3>

// ============================
// STATE
// ============================
let budgetItems = [];
let savedBudgets = JSON.parse(localStorage.getItem('eletricaBudgets') || '[]');
let settings = JSON.parse(localStorage.getItem('eletricaSettings') || '{"name":"Sua Empresa Elétrica","phone":"","email":"","addr":"","cnpj":""}');
let budgetCounter = parseInt(localStorage.getItem('eletricaCounter') || '1');
let currentBudgetId = null;

// ============================
// RENDER SERVICES
// ============================
function renderServices(filter = '') {
  const container = document.getElementById('servicesContainer');
  container.innerHTML = '';

  SERVICES.forEach(cat => {
    const filtered = filter
      ? cat.items.filter(i => i.name.toLowerCase().includes(filter.toLowerCase()))
      : cat.items;
    if (!filtered.length) return;

    const div = document.createElement('div');
    div.className = 'category';
    div.id = 'cat_' + cat.id;

    div.innerHTML = `
      <div class="category-header" onclick="toggleCat('${cat.id}')">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-title" style="color:${cat.color}">${cat.title}</span>
        <span class="cat-count">${filtered.length}</span>
        <span class="cat-toggle">▼</span>
      </div>
      <div class="service-list" id="list_${cat.id}"></div>
    `;

    const list = div.querySelector('.service-list');

    filtered.forEach(item => {
      const row = document.createElement('div');
      row.className = 'service-item' + (budgetItems.find(b => b.id === item.id) ? ' added' : '');
      row.id = 'row_' + item.id;

      let priceHTML = '';
      if (!item.prices) {
        priceHTML = `<span class="price-btn eval">Sob avaliação</span>`;
      } else if (item.prices.length === 1) {
        priceHTML = `<button class="price-btn single" onclick="addItem('${cat.id}','${item.id}',${item.prices[0]},event)">R$ ${fmtN(item.prices[0])}${item.unit||''}</button>`;
      } else {
        const labels = ['Simples', 'Padrão', 'Complexo'];
        priceHTML = item.prices.map((p, i) =>
          `<button class="price-btn" onclick="addItem('${cat.id}','${item.id}',${p},event)" title="${labels[i]}">R$ ${fmtN(p)}${item.unit||''}</button>`
        ).join('');
      }

      row.innerHTML = `
        <span class="service-name">${item.name}</span>
        <div class="service-prices">${priceHTML}</div>
      `;

      list.appendChild(row);
    });

    container.appendChild(div);
  });
}

function toggleCat(id) {
  document.getElementById('cat_' + id).classList.toggle('collapsed');
}

function filterServices() {
  renderServices(document.getElementById('searchInput').value);
}

// ============================
// ADD / REMOVE ITEMS
// ============================
function addItem(catId, itemId, price, e) {
  e.stopPropagation();
  const cat = SERVICES.find(c => c.id === catId);
  const item = cat.items.find(i => i.id === itemId);

  const existing = budgetItems.find(b => b.id === itemId && b.price === price);
  if (existing) {
    existing.qty++;
  } else {
    budgetItems.push({ id: itemId, name: item.name, price, qty: 1, labor: 0 });
  }

  document.getElementById('row_' + itemId)?.classList.add('added');
  renderBudgetItems();
  recalcTotal();
  showToast('✅ Adicionado: ' + item.name, 'success');
}

function removeItem(idx) {
  const removed = budgetItems.splice(idx, 1)[0];
  const any = budgetItems.find(b => b.id === removed.id);
  if (!any) document.getElementById('row_' + removed.id)?.classList.remove('added');
  renderBudgetItems();
  recalcTotal();
}

function changeQty(idx, delta) {
  budgetItems[idx].qty = Math.max(1, budgetItems[idx].qty + delta);
  renderBudgetItems();
  recalcTotal();
}

function updateLabor(idx, val) {
  budgetItems[idx].labor = parseFloat(val) || 0;
  recalcTotal();
}

// ============================
// RENDER BUDGET ITEMS
// ============================
function renderBudgetItems() {
  const container = document.getElementById('budgetItems');
  if (!budgetItems.length) {
    container.innerHTML = `<div class="empty-state"><div class="e-icon">⚡</div><div>Clique nos serviços ao lado<br>para adicionar ao orçamento</div></div>`;
    return;
  }
  container.innerHTML = budgetItems.map((item, i) => `
    <div class="budget-item">
      <div class="bi-info">
        <div class="bi-name">${item.name}</div>
        <div class="bi-controls">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
          <span style="font-size:11px;color:var(--muted)">× R$ ${fmtN(item.price)}</span>
        </div>
        <div class="bi-labor">
          <span class="labor-label">M.O.:</span>
          <input class="labor-input" type="number" min="0" step="0.01" value="${item.labor}"
            oninput="updateLabor(${i},this.value)" placeholder="0,00">
          <span style="font-size:11px;color:var(--muted)">R$ por unid.</span>
        </div>
      </div>
      <div>
        <div class="bi-price">R$ ${fmtN((item.price + item.labor) * item.qty)}</div>
        <button class="bi-remove" onclick="removeItem(${i})">✕</button>
      </div>
    </div>
  `).join('');
}

// ============================
// TOTALS
// ============================
function recalcTotal() {
  let services = 0, labor = 0;
  budgetItems.forEach(i => {
    services += i.price * i.qty;
    labor += i.labor * i.qty;
  });
  const disc = parseFloat(document.getElementById('discountVal').value) || 0;
  const grand = services + labor - disc;

  document.getElementById('subtotalServices').textContent = 'R$ ' + fmtN(services);
  document.getElementById('subtotalLabor').textContent = 'R$ ' + fmtN(labor);
  document.getElementById('grandTotal').textContent = 'R$ ' + fmtN(Math.max(0, grand));
}

// ============================
// SAVE
// ============================
function saveBudget() {
  if (!budgetItems.length) { showToast('⚠ Adicione serviços primeiro', 'error'); return; }
  const name = document.getElementById('clientName').value || 'Cliente';
  document.getElementById('saveClientConfirm').value = name;
  document.getElementById('saveModal').classList.add('open');
}

function confirmSave() {
  const client = document.getElementById('saveClientConfirm').value || 'Cliente';
  const note = document.getElementById('saveNote').value;
  const disc = parseFloat(document.getElementById('discountVal').value) || 0;

  let services = 0, labor = 0;
  budgetItems.forEach(i => { services += i.price * i.qty; labor += i.labor * i.qty; });

  const budget = {
    id: currentBudgetId || Date.now(),
    num: String(budgetCounter).padStart(3, '0'),
    client,
    phone: document.getElementById('clientPhone').value,
    addr: document.getElementById('clientAddr').value,
    obs: document.getElementById('clientObs').value,
    note,
    items: JSON.parse(JSON.stringify(budgetItems)),
    discount: disc,
    total: services + labor - disc,
    date: new Date().toLocaleDateString('pt-BR'),
    timestamp: Date.now()
  };

  const existing = savedBudgets.findIndex(b => b.id === budget.id);
  if (existing >= 0) {
    savedBudgets[existing] = budget;
  } else {
    savedBudgets.unshift(budget);
    budgetCounter++;
    localStorage.setItem('eletricaCounter', budgetCounter);
  }

  currentBudgetId = budget.id;
  localStorage.setItem('eletricaBudgets', JSON.stringify(savedBudgets));
  document.getElementById('saveModal').classList.remove('open');
  showToast('💾 Orçamento salvo!', 'success');
}

function closeSaveModal() {
  document.getElementById('saveModal').classList.remove('open');
}

// ============================
// PRINT
// ============================
function printBudget() {
  if (!budgetItems.length) { showToast('⚠ Adicione serviços primeiro', 'error'); return; }

  const client = document.getElementById('clientName').value || '—';
  const phone = document.getElementById('clientPhone').value;
  const addr = document.getElementById('clientAddr').value;
  const obs = document.getElementById('clientObs').value;
  const disc = parseFloat(document.getElementById('discountVal').value) || 0;
  const num = String(budgetCounter).padStart(3, '0');

  let services = 0, labor = 0;
  budgetItems.forEach(i => { services += i.price * i.qty; labor += i.labor * i.qty; });
  const grand = services + labor - disc;

  const tableRows = budgetItems.map(item => {
    const showLabor = item.labor > 0;
    const total = (item.price + item.labor) * item.qty;
    return `
      <tr>
        <td>${item.name}</td>
        <td style="text-align:center">${item.qty}</td>
        <td style="text-align:right">R$ ${fmtN(item.price)}</td>
        <td style="text-align:right">${showLabor ? 'R$ ' + fmtN(item.labor) : '—'}</td>
        <td style="text-align:right;font-weight:600">R$ ${fmtN(total)}</td>
      </tr>
    `;
  }).join('');

  const discRow = disc > 0 ? `<div class="pt-row"><span>Desconto</span><span>− R$ ${fmtN(disc)}</span></div>` : '';
  const laborRow = labor > 0 ? `<div class="pt-row"><span>Mão de obra</span><span>R$ ${fmtN(labor)}</span></div>` : '';

  document.getElementById('printArea').innerHTML = `
    <div class="print-header">
      <div class="print-company">
        <div class="print-company-name">⚡ ${escHtml(settings.name || 'Elétrica Pro')}</div>
        <div class="print-company-sub">${[settings.phone, settings.email, settings.addr].filter(Boolean).join(' · ')}</div>
        ${settings.cnpj ? `<div class="print-company-sub">CNPJ/CPF: ${escHtml(settings.cnpj)}</div>` : ''}
      </div>
      <div class="print-meta">
        <div class="print-orcamento-num">ORÇAMENTO #${num}</div>
        <div class="print-date">${new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'})}</div>
      </div>
    </div>

    <div class="print-client-box">
      <strong>Cliente:</strong> ${escHtml(client)}<br>
      ${phone ? `<strong>Telefone:</strong> ${escHtml(phone)}<br>` : ''}
      ${addr ? `<strong>Endereço:</strong> ${escHtml(addr)}<br>` : ''}
      ${obs ? `<div class="print-obs"><strong>Obs:</strong> ${escHtml(obs)}</div>` : ''}
    </div>

    <table class="print-table">
      <thead>
        <tr>
          <th>Serviço</th>
          <th style="text-align:center">Qtd</th>
          <th style="text-align:right">Unitário</th>
          <th style="text-align:right">M.O. (unid.)</th>
          <th style="text-align:right">Total</th>
        </tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>

    <div class="print-totals">
      <div class="print-totals-box">
        <div class="pt-row"><span>Subtotal</span><span>R$ ${fmtN(services)}</span></div>
        ${laborRow}
        ${discRow}
        <div class="pt-row grand"><span>TOTAL</span><span>R$ ${fmtN(Math.max(0, grand))}</span></div>
      </div>
    </div>

    <div class="print-sig">
      <div class="sig-line">Assinatura do Responsável</div>
      <div class="sig-line">Assinatura do Cliente</div>
    </div>

    <div class="print-footer">
      <span>⚡ ${escHtml(settings.name || 'Elétrica Pro')} · Orçamento válido por 30 dias</span>
      <span>Gerado em ${new Date().toLocaleDateString('pt-BR')}</span>
    </div>
  `;

  window.print();
}

// SAVED TAB
// ============================
function renderSaved() {
  const grid = document.getElementById('savedGrid');
  document.getElementById('savedCount').textContent = savedBudgets.length + ' orçamento' + (savedBudgets.length !== 1 ? 's' : '');

  if (!savedBudgets.length) {
    grid.innerHTML = `<div style="color:var(--muted);font-size:14px;grid-column:1/-1;padding:40px 0;text-align:center">Nenhum orçamento salvo ainda.</div>`;
    return;
  }

  grid.innerHTML = savedBudgets.map((b, i) => `
    <div class="saved-card">
      <div class="sc-num">ORÇAMENTO #${b.num}</div>
      <div class="sc-name">${escHtml(b.client)}</div>
      <div class="sc-date">📅 ${b.date}${b.note ? ' · ' + escHtml(b.note) : ''}</div>
      <div class="sc-total">R$ ${fmtN(b.total)}</div>
      <div class="sc-actions">
        <button class="btn btn-outline btn-sm" onclick="loadBudget(${i})">📋 Abrir</button>
        <button class="btn btn-primary btn-sm" onclick="printSaved(${i})">🖨 Imprimir</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSaved(${i})">🗑</button>
      </div>
    </div>
  `).join('');
}

function loadBudget(i) {
  const b = savedBudgets[i];
  budgetItems = JSON.parse(JSON.stringify(b.items));
  document.getElementById('clientName').value = b.client;
  document.getElementById('clientPhone').value = b.phone || '';
  document.getElementById('clientAddr').value = b.addr || '';
  document.getElementById('clientObs').value = b.obs || '';
  document.getElementById('discountVal').value = b.discount || 0;
  currentBudgetId = b.id;
  document.getElementById('budgetNumDisplay').textContent = 'Orçamento #' + b.num;
  renderBudgetItems();
  recalcTotal();
  renderServices();
  switchTab('new');
  showToast('📋 Orçamento carregado!', 'success');
}

function printSaved(i) {
  const b = savedBudgets[i];
  budgetItems = JSON.parse(JSON.stringify(b.items));
  document.getElementById('clientName').value = b.client;
  document.getElementById('clientPhone').value = b.phone || '';
  document.getElementById('clientAddr').value = b.addr || '';
  document.getElementById('clientObs').value = b.obs || '';
  document.getElementById('discountVal').value = b.discount || 0;
  printBudget();
}

function deleteSaved(i) {
  if (!confirm('Excluir este orçamento?')) return;
  savedBudgets.splice(i, 1);
  localStorage.setItem('eletricaBudgets', JSON.stringify(savedBudgets));
  renderSaved();
  showToast('🗑 Orçamento excluído', 'error');
}

function exportAll() {
  const data = JSON.stringify(savedBudgets, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'orcamentos-backup.json';
  a.click();
}

// ============================

  document.getElementById('companyName').value = settings.name || '';
  document.getElementById('companyPhone').value = settings.phone || '';
  document.getElementById('companyEmail').value = settings.email || '';
  document.getElementById('companyAddr').value = settings.addr || '';
  document.getElementById('companyCnpj').value = settings.cnpj || '';
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function saveSettings() {
  settings = {
    name: document.getElementById('companyName').value,
    phone: document.getElementById('companyPhone').value,
    email: document.getElementById('companyEmail').value,
    addr: document.getElementById('companyAddr').value,
    cnpj: document.getElementById('companyCnpj').value,
  };
  localStorage.setItem('eletricaSettings', JSON.stringify(settings));

  // Update logo
  const n = settings.name || 'Elétrica Pro';
  const mid = Math.ceil(n.length / 2);
  document.querySelector('.logo').innerHTML = `<div class="logo-icon">⚡</div><div>${escHtml(n.slice(0,mid))}<span>${escHtml(n.slice(mid))}</span></div>`;

  closeSettings();
  showToast('✅ Dados salvos!', 'success');
}

// ============================
// TABS
// ============================
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', (tab === 'new' && i === 0) || (tab === 'saved' && i === 1)));
  document.getElementById('newTab').style.display = tab === 'new' ? 'grid' : 'none';
  document.getElementById('savedPanel').style.display = tab === 'saved' ? 'block' : 'none';
  if (tab === 'saved') renderSaved();
}

// ============================
// HELPERS
// ============================
function newBudget() {
  if (budgetItems.length && !confirm('Iniciar novo orçamento? O atual não salvo será perdido.')) return;
  budgetItems = [];
  currentBudgetId = null;
  document.getElementById('clientName').value = '';
  document.getElementById('clientPhone').value = '';
  document.getElementById('clientAddr').value = '';
  document.getElementById('clientObs').value = '';
  document.getElementById('discountVal').value = 0;
  document.getElementById('budgetNumDisplay').textContent = 'Orçamento #' + String(budgetCounter).padStart(3, '0');
  renderBudgetItems();
  recalcTotal();
  renderServices();
  switchTab('new');
}

function clearBudget() {
  if (!confirm('Limpar todos os itens?')) return;
  budgetItems = [];
  renderBudgetItems();
  recalcTotal();
  renderServices();
}

function updatePreview() {}

function fmtN(n) {
  return parseFloat(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ============================
// INIT
// ============================
renderServices();
renderBudgetItems();
document.getElementById('budgetNumDisplay').textContent = 'Orçamento #' + String(budgetCounter).padStart(3, '0');
if (settings.name) {
  const n = settings.name;
  const mid = Math.ceil(n.length / 2);
  document.querySelector('.logo').innerHTML = `<div class="logo-icon">⚡</div><div>${escHtml(n.slice(0,mid))}<span>${escHtml(n.slice(mid))}</span></div>`;
}
</script>
